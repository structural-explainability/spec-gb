# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# spec-gb
# ============================================================

schema = "se-manifest-schema"
schema_url = "https://github.com/structural-explainability/se-manifest-schema/blob/main/manifest-schema.toml"

# === Identity ===

[meta]
purpose = "To make explicit the boundaries, responsibilities, and expectations of this repository relative to others."

[repo]
name = "spec-gb"
org = "structural-explainability"
class = "spec"
kind = "governance-boundary"
status = "active"
since = "2025"
summary = "Defines the Governance Boundary for structural explainability."

[layer]
space = "SE"
role = "specification"

# === Dependencies ===

[depends]
required = ["structural-explainability/spec-se@v1"]
optional = []

# === Provided artifacts ===

[provides]
artifacts = [
  "README.md",
  "SPEC.md",
  "IDENTIFIERS.md",
  "CONFORMANCE.md",
  "data/spec/requirements.json",
  "data/spec/conformance-checks.json",
  "data/spec/scope-exclusions.json",
]

# === Scope ===

[scope]
includes = [
  "structural governance artifacts",
  "adapter identity, scope, and compatibility claims",
  "canonical encoding requirements",
  "structural dependency graphs among governance artifacts",
  "governance actions over artifacts",
  "structural provenance for governance lifecycle events",
  "versioning rules for governance artifacts and specifications",
]

excludes = [
  "domain vocabularies",
  "application-specific semantics",
  "behavioral models",
  "causal explanations",
  "epistemic evaluation",
  "authority",
  "legitimacy",
  "obligation",
  "normative judgment or enforcement",
  "exchange or interaction mechanisms",
  "identity-and-persistence regime specifications",
  "graph evolution semantics",
  "interpretive or explanatory overlays",
]

# === Validation ===

[validation]
entrypoint = "uv run se-validate"
export_check_entrypoint = "uv run se-ref-export --check"
reference_entrypoint = "uv run se-ref-validate"
strict_entrypoint = "uv run se-validate --strict"
tag_entrypoint = "uv run python -m se_manifest_schema validate --strict --require-tag"

# === Behavior / governance ===

[naming]
pattern = "spec-*"

[governance]
authority = "structural-explainability"

# === External references ===

[citation]
cff = "CITATION.cff"
preferred = "spec"

[traceability]
identifier_map = "structural-explainability/spec-gb/IDENTIFIERS.md"
